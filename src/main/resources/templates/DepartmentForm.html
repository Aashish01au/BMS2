<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Department Edit Form</title>
</head>
<body>
<th:bolck th:insert="header.html"></th:bolck>
	<div class="container-fluid">
	<div class="card">
	<div class="card-header bg-primary text-center text-white"><h5> Department Edit Form</h5></div>
	<div class="card-body">
	<form action="department" method="post" >
	<div class="row p-2">
	<div class="col-4">Department Name </div>
	<div class="col-6"> <input type="text" name="dept_name" required="required"  class="form-control"></div>
	</div>
	<div class="row p-2">
	<div class="col-4">Department Head (HOD) </div>
	<div class="col-6"> <input type="text" name="dept_head" required="required"  class="form-control"></div>
	</div>
	<div class="row p-2">
	<div class="col-4">Department Phone  </div>
	<div class="col-6"> <input type="text" name="dept_phone" required="required"  class="form-control"></div>
	</div>
	<div class="row p-2">
	<div class="col-4"> </div>
	<div class="col-6 "> <input type="submit" value="Update"  class="btn btn-success  "></div>
	</div>
	</form>
	<div class="card-footer text-center bg-warning text-white">copyright@2024</div>
	</div>
	</div>
		</div>
</body>
</html>
